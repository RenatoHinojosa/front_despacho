name: Build, Push and Deploy Frontend

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY_URL: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{ env.REGISTRY_URL }}/$ECR_REPOSITORY:$IMAGE_TAG -t ${{ env.REGISTRY_URL }}/$ECR_REPOSITORY:latest .
          docker push ${{ env.REGISTRY_URL }}/$ECR_REPOSITORY:$IMAGE_TAG
          docker push ${{ env.REGISTRY_URL }}/$ECR_REPOSITORY:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Frontend via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Frontend" \
            --parameters '{"commands":[
              "set -e",
              "mkdir -p /home/ec2-user/frontend",
              "cd /home/ec2-user/frontend",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.REGISTRY_URL }}",
              "docker pull ${{ env.REGISTRY_URL }}/${{ secrets.AWS_ECR_REPOSITORY }}:latest",
              "docker stop react-frontend || true",
              "docker rm react-frontend || true",
              "docker run -d --name react-frontend -p 80:80 ${{ env.REGISTRY_URL }}/${{ secrets.AWS_ECR_REPOSITORY }}:latest",
              "docker image prune -a -f"
            ]}' \
            --output text
