upstream backend_ventas {
  server 10.0.138.204:8080;
}

upstream backend_despachos {
  server 10.0.133.128:8081;
}

server {
  listen 80;
  server_name _;
  charset utf-8;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/v1/ventas/ {
    proxy_pass http://backend_ventas;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /api/v1/ventas {
    proxy_pass http://backend_ventas/api/v1/ventas;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /api/v1/ventas/ {
    proxy_pass http://backend_ventas/api/v1/ventas;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/v1/despachos/ {
    proxy_pass http://backend_despachos;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /api/v1/despachos {
    proxy_pass http://backend_despachos/api/v1/despachos;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /api/v1/despachos/ {
    proxy_pass http://backend_despachos/api/v1/despachos;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}